<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot PIN - Voting Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="container page-content">
            <header class="page-header">
                <div>
                    <h1>Forgot PIN</h1>
                    <p>Enter your phone number to reset your PIN.</p>
                </div>
            </header>

            <main>
                <form method="POST" class="form-card">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="phone" pattern="[0-9]{10}" maxlength="10" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Reset PIN</button>
                </form>

                <div class="links">
                    <a href="{{ url_for('login') }}">Back to Login</a>
                </div>
            </main>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
</body>
</html>
