<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Voting Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="container page-content">
            <header class="page-header">
                <div>
                    <h1>Register for Voting</h1>
                    <p>Create your voter profile with Aadhaar and a secure 4-digit PIN.</p>
                </div>
            </header>

            <main>
                <form method="POST" class="form-card">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label for="aadhaar">Aadhaar Number (12 digits) *</label>
                    <input type="text" id="aadhaar" name="aadhaar" pattern="[0-9]{12}" maxlength="12" required>
                </div>

                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required>
                </div>

                <div class="form-group">
                    <label for="nri">NRI (Non-Resident Indian)? *</label>
                    <select id="nri" name="nri" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="pin">Choose a 4-digit PIN *</label>
                    <input type="password" id="pin" name="pin" pattern="[0-9]{4}" maxlength="4" required placeholder="Enter 4-digit PIN">
                </div>

                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <div class="links">
                <a href="{{ url_for('login') }}">Already registered? Login here</a>
            </div>
        </main>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
